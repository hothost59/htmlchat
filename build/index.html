<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Chat 💬</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googletagmanager.com https://cdn.jsdelivr.net https://esm.sh https://*.firebaseio.com; connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://*.googleapis.com https://www.gstatic.com https://cdn.jsdelivr.net https://esm.sh; style-src 'self' 'unsafe-inline'; img-src https:; font-src 'none'; object-src 'none'; frame-src https://*.firebaseio.com; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;">
    <script>
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({"gtm.start":new Date().getTime(),event:"gtm.js"});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!="dataLayer"?"&l="+l:"";j.async=true;j.src="https://www.googletagmanager.com/gtm.js?id="+i+dl;f.parentNode.insertBefore(j,f);})(window,document,"script","dataLayer","GTM-5XKHS5WN");
    </script>
</head>
<body class="cozy">
    <div id="authDiv">
        <div class="authCard">
            <button class="tinyBtn" id="themeBtn" style="position:absolute;top:20px;right:20px" onclick="toggleTheme()">🌙</button>
            <h3 id="authTitle">Welcome back!</h3>
            <div id="authSubtext">We're so excited to see you again!</div>
            <div id="authTabs" style="display:none"><button id="loginTab"></button><button id="signupTab"></button></div>
            <div><label class="auth-label">Username</label><input id="authUsername" /></div>
            <div><label class="auth-label">Password</label><input id="authPassword" type="password" /></div>
            <div id="authConfirmContainer" style="display:none"><label class="auth-label">Confirm Password</label><input id="authConfirm" type="password" /></div>
            <div id="passwordRequirements" style="display:none">
                <div id="req-length" class="requirement">✅ 8+ characters</div>
                <div id="req-upper" class="requirement">✅ One uppercase</div>
                <div id="req-num" class="requirement">✅ One number</div>
            </div>
            <button id="submitBtn" onclick="submitAuth()">Login</button>
            <div id="authFooter">Need an account? <a href="#" onclick="switchAuth('signup');return false">Register</a></div>
            <div id="authMessage"></div>
        </div>
    </div>
    <div id="app" style="display:none">
        <div id="sidebar">
            <div id="sidebarHeader">
                <div>Channels 🗨️</div>
                <div class="controls">
                    <button class="tinyBtn" onclick="showNotificationsModal()">🔔<div class="badge" id="notifBadge"></div></button>
                    <button id="myStatusBtn" class="tinyBtn" onclick="cycleStatus()">🟢</button>
                    <button class="tinyBtn" onclick="showSettingsModal()">⚙️</button>
                    <button class="tinyBtn" onclick="logout()">🚪</button>
                </div>
            </div>
            <div id="channelList"></div>
            <button class="discord-btn" onclick="showBrowseDialog()" style="margin-top:10px">Browse / Create</button>
        </div>
        <div id="main">
            <div id="chatHeader"><div id="chatTitle">No channel selected</div><div id="meLabel"></div></div>
            <div style="display:flex;flex:1;min-height:0">
                <div id="messages"></div>
                <div id="rightbar">
                    <div style="font-weight:800;margin-bottom:10px">Users 👥</div>
                    <div id="userList"></div>
                </div>
            </div>
            <div id="replyPreview" style="display:none">
                <span onclick="cancelReply()" style="float:right;cursor:pointer">✖️</span>
                Replying to <strong id="replyUser"></strong>: <span id="replyText"></span>
            </div>
            <div id="bottomBar">
                <textarea id="msgInput" placeholder="Type a message..." rows="1" oninput="autoExpand(this)"></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <button id="scrollBtn">⬇️</button>
    <div id="modalOverlay">
        <div class="modalCard">
            <h3 id="modalTitle"></h3>
            <div id="modalSubtitle"></div>
            <div id="modalCustomContent"></div>
            <input id="modalInput" autocomplete="off" style="display:none" />
            <div class="modalActions">
                <button id="modalConfirmBtn" onclick="submitModal()">OK</button>
                <button id="modalCancelBtn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script type="module">
        import { RegExpMatcher, TextCensor, englishDataset, englishRecommendedTransformers } from "https://esm.sh/obscenity@0.4.6";
        window.obscenity = { 
            matcher: new RegExpMatcher({ ...englishDataset.build(), ...englishRecommendedTransformers }),
            censor: new TextCensor()
        };
    </script>
    <script src="js/init.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
